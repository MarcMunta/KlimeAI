<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vortex | Local Core</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      (function() {
        const savedMode = localStorage.getItem('dark-mode');
        const systemDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        if (savedMode === 'true' || (savedMode === null && systemDark)) {
          document.documentElement.classList.add('dark');
        } else {
          document.documentElement.classList.remove('dark');
        }
      })();

      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              border: "hsl(var(--border) / <alpha-value>)",
              input: "hsl(var(--input) / <alpha-value>)",
              ring: "hsl(var(--ring) / <alpha-value>)",
              background: "hsl(var(--background) / <alpha-value>)",
              foreground: "hsl(var(--foreground) / <alpha-value>)",
              primary: {
                DEFAULT: "hsl(var(--primary) / <alpha-value>)",
                foreground: "hsl(var(--primary-foreground) / <alpha-value>)",
              },
              muted: {
                DEFAULT: "hsl(var(--muted) / <alpha-value>)",
                foreground: "hsl(var(--muted-foreground) / <alpha-value>)",
              },
              accent: {
                DEFAULT: "hsl(var(--accent) / <alpha-value>)",
                foreground: "hsl(var(--accent-foreground) / <alpha-value>)",
              },
            },
            borderRadius: {
              'xl': '1rem',
              '2xl': '1.5rem',
              '3xl': '2rem',
              '4xl': '2.5rem',
              '5xl': '3rem',
            },
            animation: {
              'pulse-glow': 'pulseGlow 4s ease-in-out infinite',
              'spin-slow': 'spin 12s linear infinite',
              'shimmer': 'shimmer 2s infinite linear',
            },
            keyframes: {
              pulseGlow: {
                '0%, 100%': { opacity: '0.4', filter: 'blur(40px)' },
                '50%': { opacity: '0.7', filter: 'blur(65px)' },
              },
              shimmer: {
                '0%': { transform: 'translateX(-100%)' },
                '100%': { transform: 'translateX(100%)' }
              }
            },
          },
        },
      };
    </script>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap');
      
      :root {
        --background: 0 0% 98%;
        --foreground: 222 14% 14%;
        --primary: 201 100% 50%;
        --primary-foreground: 0 0% 100%;
        --muted: 210 12% 94%;
        --muted-foreground: 220 8% 43%;
        --border: 220 10% 87%;
        --ring: 201 100% 50%;
        --ambient-glow: rgba(0, 174, 255, 0.08);
        --ambient-glow-dark: rgba(0, 174, 255, 0.1);
      }

      .dark {
        --background: 222 11% 11%;
        --foreground: 210 17% 95%;
        --primary: 201 100% 56%;
        --primary-foreground: 0 0% 100%;
        --muted: 222 9% 15%;
        --muted-foreground: 215 10% 67%;
        --border: 222 8% 22%;
        --ring: 201 100% 56%;
        --ambient-glow: rgba(0, 174, 255, 0.08);
        --ambient-glow-dark: rgba(0, 174, 255, 0.16);
      }

      html[data-app-mode="agent"] {
        --primary: 273 100% 68%;
        --ring: 273 100% 68%;
        --ambient-glow: rgba(151, 71, 255, 0.14);
        --ambient-glow-dark: rgba(151, 71, 255, 0.2);
      }

      html.dark[data-app-mode="agent"] {
        --primary: 273 100% 72%;
        --ring: 273 100% 72%;
        --ambient-glow: rgba(151, 71, 255, 0.12);
        --ambient-glow-dark: rgba(151, 71, 255, 0.24);
      }

      * {
        scroll-behavior: smooth;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        outline: none !important;
      }

      html, body {
        color-scheme: light;
      }

      html.dark, body.dark {
        color-scheme: dark;
      }

      body {
        font-family: 'Inter', sans-serif;
        background-color: hsl(var(--background));
        color: hsl(var(--foreground));
        overflow: hidden;
        margin: 0;
        background-image:
          radial-gradient(circle at top, var(--ambient-glow), transparent 26%),
          linear-gradient(180deg, rgba(250, 250, 250, 0.98), rgba(245, 245, 245, 0.98));
        background-attachment: fixed;
        transition: background-color 0.8s cubic-bezier(0.4, 0, 0.2, 1);
      }

      .dark body {
        background-image:
          radial-gradient(circle at top, var(--ambient-glow-dark), transparent 22%),
          linear-gradient(180deg, rgba(27, 27, 30, 0.98), rgba(17, 17, 19, 0.99));
      }

      .custom-scrollbar::-webkit-scrollbar { width: 4px; }
      .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
      .custom-scrollbar::-webkit-scrollbar-thumb {
        background: hsla(var(--muted-foreground) / 0.2);
        border-radius: 20px;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb:hover {
        background: hsla(var(--primary) / 0.5);
      }

      .accelerated {
        will-change: transform, opacity;
        backface-visibility: hidden;
        transform: translateZ(0);
      }

      .glass-card {
        background: hsla(var(--background) / 0.8);
        -webkit-backdrop-filter: blur(14px) saturate(140%);
        backdrop-filter: blur(14px) saturate(140%);
        border: 1px solid hsla(var(--border) / 0.75);
        box-shadow: 0 18px 52px -42px rgba(15, 23, 42, 0.2);
        transition: border-color 0.4s ease, background-color 0.4s ease;
      }

      .vortex-grid-bg {
        background-image: radial-gradient(circle at 1px 1px, rgba(15, 23, 42, 0.08) 1px, transparent 0);
        background-size: 32px 32px;
      }
      
      .dark .glass-card {
        background: hsla(var(--background) / 0.86);
        border: 1px solid hsla(var(--border) / 0.92);
        box-shadow: 0 24px 70px -46px rgba(0, 0, 0, 0.7);
      }

      .dark .vortex-grid-bg {
        background-image: radial-gradient(circle at 1px 1px, rgba(255, 255, 255, 0.045) 1px, transparent 0);
      }

      .surface-panel {
        background: hsla(var(--background) / 0.9);
        border: 1px solid hsla(var(--border) / 0.92);
        box-shadow: 0 18px 54px -44px rgba(15, 23, 42, 0.16);
      }

      .dark .surface-panel {
        background: hsla(var(--background) / 0.96);
        box-shadow: 0 24px 72px -52px rgba(0, 0, 0, 0.72);
      }

      .markdown-content p { margin-bottom: 1.25rem; line-height: 1.8; }
      .markdown-content code { font-family: 'JetBrains Mono', monospace; }

      .typing-cursor {
        display: inline-block;
        width: 3px;
        height: 1.2em;
        background-color: hsl(var(--primary));
        margin-left: 4px;
        vertical-align: middle;
        border-radius: 4px;
        box-shadow: 0 0 12px hsl(var(--primary) / 0.6);
        animation: blink 0.8s step-end infinite;
      }

      @keyframes blink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
