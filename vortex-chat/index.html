<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vortex | Local Core</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      (function() {
        const savedMode = localStorage.getItem('dark-mode');
        const systemDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        if (savedMode === 'true' || (savedMode === null && systemDark)) {
          document.documentElement.classList.add('dark');
        } else {
          document.documentElement.classList.remove('dark');
        }
      })();

      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              border: "hsl(var(--border) / <alpha-value>)",
              input: "hsl(var(--input) / <alpha-value>)",
              ring: "hsl(var(--ring) / <alpha-value>)",
              background: "hsl(var(--background) / <alpha-value>)",
              foreground: "hsl(var(--foreground) / <alpha-value>)",
              primary: {
                DEFAULT: "hsl(var(--primary) / <alpha-value>)",
                foreground: "hsl(var(--primary-foreground) / <alpha-value>)",
              },
              muted: {
                DEFAULT: "hsl(var(--muted) / <alpha-value>)",
                foreground: "hsl(var(--muted-foreground) / <alpha-value>)",
              },
              accent: {
                DEFAULT: "hsl(var(--accent) / <alpha-value>)",
                foreground: "hsl(var(--accent-foreground) / <alpha-value>)",
              },
            },
            borderRadius: {
              'xl': '1rem',
              '2xl': '1.5rem',
              '3xl': '2rem',
              '4xl': '2.5rem',
              '5xl': '3rem',
            },
            animation: {
              'pulse-glow': 'pulseGlow 4s ease-in-out infinite',
              'spin-slow': 'spin 12s linear infinite',
              'shimmer': 'shimmer 2s infinite linear',
            },
            keyframes: {
              pulseGlow: {
                '0%, 100%': { opacity: '0.4', filter: 'blur(40px)' },
                '50%': { opacity: '0.7', filter: 'blur(65px)' },
              },
              shimmer: {
                '0%': { transform: 'translateX(-100%)' },
                '100%': { transform: 'translateX(100%)' }
              }
            },
          },
        },
      };
    </script>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap');
      
      :root {
        --background: 210 50% 99%;
        --foreground: 220 39% 8%;
        --primary: 198 100% 50%;
        --primary-foreground: 0 0% 100%;
        --muted: 210 40% 96%;
        --muted-foreground: 220 13% 35%;
        --border: 214 30% 89%;
        --ring: 198 100% 50%;
      }

      .dark {
        --background: 222 47% 4%;
        --foreground: 210 40% 98%;
        --primary: 196 100% 52%;
        --primary-foreground: 222 47% 8%;
        --muted: 224 28% 10%;
        --muted-foreground: 215 20% 75%;
        --border: 224 22% 16%;
        --ring: 196 100% 52%;
      }

      * {
        scroll-behavior: smooth;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        outline: none !important;
      }

      body {
        font-family: 'Space Grotesk', sans-serif;
        background-color: hsl(var(--background));
        color: hsl(var(--foreground));
        overflow: hidden;
        margin: 0;
        background-image:
          radial-gradient(circle at 14% 14%, rgba(0, 194, 255, 0.16), transparent 24%),
          radial-gradient(circle at 86% 10%, rgba(255, 255, 255, 0.78), transparent 16%),
          linear-gradient(180deg, rgba(255, 255, 255, 0.96), rgba(242, 248, 255, 0.96));
        background-attachment: fixed;
        transition: background-color 0.8s cubic-bezier(0.4, 0, 0.2, 1);
      }

      .dark body {
        background-image:
          radial-gradient(circle at 16% 18%, rgba(0, 194, 255, 0.22), transparent 28%),
          radial-gradient(circle at 84% 10%, rgba(255, 255, 255, 0.08), transparent 16%),
          linear-gradient(180deg, rgba(2, 6, 13, 0.98), rgba(1, 4, 10, 0.98));
      }

      .custom-scrollbar::-webkit-scrollbar { width: 4px; }
      .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
      .custom-scrollbar::-webkit-scrollbar-thumb {
        background: hsla(var(--muted-foreground) / 0.2);
        border-radius: 20px;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb:hover {
        background: hsla(var(--primary) / 0.5);
      }

      .accelerated {
        will-change: transform, opacity;
        backface-visibility: hidden;
        transform: translateZ(0);
      }

      .glass-card {
        background: hsla(var(--background) / 0.65);
        -webkit-backdrop-filter: blur(32px) saturate(180%);
        backdrop-filter: blur(32px) saturate(180%);
        border: 1px solid hsla(var(--border) / 0.4);
        transition: border-color 0.4s ease, background-color 0.4s ease;
      }

      .vortex-grid-bg {
        background-image: radial-gradient(circle at 2px 2px, rgba(0, 194, 255, 0.34) 1px, transparent 0);
        background-size: 40px 40px;
      }
      
      .dark .glass-card {
        background: hsla(var(--background) / 0.55);
        border: 1px solid hsla(var(--border) / 0.35);
      }

      .markdown-content p { margin-bottom: 1.25rem; line-height: 1.8; }
      .markdown-content code { font-family: 'JetBrains Mono', monospace; }

      .typing-cursor {
        display: inline-block;
        width: 3px;
        height: 1.2em;
        background-color: hsl(var(--primary));
        margin-left: 4px;
        vertical-align: middle;
        border-radius: 4px;
        box-shadow: 0 0 12px hsl(var(--primary) / 0.6);
        animation: blink 0.8s step-end infinite;
      }

      @keyframes blink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
