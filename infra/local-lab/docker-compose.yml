services:
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: vortex-open-webui
    restart: unless-stopped
    environment:
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      WEBUI_AUTH: "False"
      ENABLE_SIGNUP: "False"
    ports:
      - "127.0.0.1:3000:8080"
    volumes:
      - D:\AI\openwebui\data:/app/backend/data

  ai-devbox:
    build:
      context: ./ai-devbox
    container_name: vortex-ai-devbox
    command: ["sleep", "infinity"]
    network_mode: "none"
    read_only: false
    tmpfs:
      - /tmp
